<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SVG Color Editor Pro</title>


<style>

*{
    box-sizing:border-box;
}


:root{

    --bg:#020617;

    --card:#111827;

    --card-light:#1e293b;

    --border:#334155;

    --primary:#6366f1;

    --secondary:#8b5cf6;

    --text:#f8fafc;

    --muted:#94a3b8;

}




body{

    margin:0;

    padding:30px;


    font-family:

    "Inter",
    "Segoe UI",
    Arial,
    sans-serif;


    background:

    radial-gradient(
        circle at top,
        #1e293b,
        #020617 70%
    );


    color:var(--text);

    min-height:100vh;

}




.container{

    max-width:1500px;

    margin:auto;

}




.header{

    margin-bottom:25px;

}



h1{

    margin:0;

    font-size:34px;

    font-weight:800;


    background:

    linear-gradient(
        90deg,
        #ffffff,
        #a5b4fc
    );


    -webkit-background-clip:text;

    color:transparent;

}



.subtitle{

    margin-top:8px;

    color:var(--muted);

    font-size:15px;

}




/* Upload area */


.upload-box{


    background:

    rgba(255,255,255,.06);


    border:

    1px dashed #64748b;


    padding:20px;


    border-radius:18px;


    margin-bottom:25px;


    transition:.3s;


}



.upload-box:hover{

    border-color:

    var(--primary);


    background:

    rgba(99,102,241,.12);

}



#fileInput{


    width:100%;


    color:white;


    cursor:pointer;


}




/* Main layout */


.layout{


    display:grid;


    grid-template-columns:

    2fr 1fr;


    gap:25px;


}




/* Preview panel */


.preview{


    min-height:700px;


    display:flex;


    align-items:center;


    justify-content:center;



    padding:35px;


    overflow:auto;


    border-radius:25px;



    background:

    rgba(255,255,255,.05);



    border:

    1px solid
    rgba(255,255,255,.1);



    backdrop-filter:

    blur(20px);



    box-shadow:

    0 25px 60px
    rgba(0,0,0,.35);


    color:#cbd5e1;


    font-size:20px;


}




.preview svg{


    max-width:100%;


    max-height:650px;


}




/* Sidebar */


.sidebar{


    background:

    rgba(15,23,42,.85);



    border:

    1px solid
    rgba(255,255,255,.1);



    border-radius:25px;



    padding:25px;



    backdrop-filter:

    blur(20px);



    box-shadow:

    0 25px 60px
    rgba(0,0,0,.3);


}



.sidebar h2{


    margin-top:0;


    font-size:22px;


}





/* Color list */


#colors{


    max-height:550px;


    overflow:auto;


    padding-right:5px;


}



#colors::-webkit-scrollbar{

    width:8px;

}


#colors::-webkit-scrollbar-thumb{


    background:#475569;


    border-radius:20px;


}




.color-item{


    display:flex;


    align-items:center;


    gap:15px;



    padding:12px;


    margin-bottom:10px;



    background:

    rgba(255,255,255,.06);



    border:

    1px solid
    rgba(255,255,255,.08);



    border-radius:14px;



    cursor:pointer;



    transition:.25s;


}




.color-item:hover{


    transform:

    translateX(5px);



    background:

    rgba(99,102,241,.25);



    border-color:

    var(--primary);


}





.swatch{


    width:42px;


    height:42px;



    border-radius:50%;



    border:

    3px solid white;



    box-shadow:

    0 8px 20px
    rgba(0,0,0,.4);


}





.color-label{


    font-family:

    monospace;



    font-size:14px;



    color:white;


    word-break:break-all;


}




#picker{


    position:absolute;


    opacity:0;


    width:1px;


    height:1px;


}





/* Buttons */


.controls{


    display:flex;


    gap:15px;


    margin-top:25px;


}





button{


    flex:1;


    padding:14px 20px;



    border:0;



    border-radius:14px;



    color:white;



    font-weight:700;



    cursor:pointer;



    background:


    linear-gradient(

        135deg,

        var(--primary),

        var(--secondary)

    );



    box-shadow:


    0 10px 30px
    rgba(99,102,241,.35);



    transition:.25s;


}




button:hover{


    transform:

    translateY(-3px);


}





button:active{


    transform:scale(.96);


}




@media(max-width:1000px){


    body{

        padding:15px;

    }


    .layout{


        grid-template-columns:1fr;


    }


    .preview{


        min-height:500px;

    }


}


</style>


</head>


<body>


<div class="container">


<div class="header">


<h1>
🎨 SVG Color Editor Pro
</h1>


<div class="subtitle">
Edit SVG colors instantly and export high quality files
</div>


</div>



<div class="upload-box">


<input 
type="file"
id="fileInput"
accept=".svg">


</div>



<div class="layout">


<div class="preview" id="preview">

Upload SVG file

</div>



<div class="sidebar">


<h2>
Colors
</h2>



<div id="colors"></div>


<input 
type="color"
id="picker">



<div class="controls">


<button id="svg">
Export SVG
</button>



<button id="png">
Export PNG
</button>


</div>


</div>


</div>


</div>
<script>


let svgText = "";

let activeColor = null;



const fileInput =
document.getElementById("fileInput");


const preview =
document.getElementById("preview");


const colorsBox =
document.getElementById("colors");


const picker =
document.getElementById("picker");





// ===============================
// Fix SVG
// ===============================


function fixSVG(svgString){


    const doc =
    new DOMParser()
    .parseFromString(
        svgString,
        "image/svg+xml"
    );


    const svg =
    doc.querySelector("svg");


    if(!svg)
        return svgString;



    svg.setAttribute(
        "xmlns",
        "http://www.w3.org/2000/svg"
    );



    let width =
    parseFloat(
        svg.getAttribute("width")
    );


    let height =
    parseFloat(
        svg.getAttribute("height")
    );



    if(
        !svg.getAttribute("viewBox") &&
        width &&
        height
    ){

        svg.setAttribute(
            "viewBox",
            `0 0 ${width} ${height}`
        );

    }



    return new XMLSerializer()
    .serializeToString(doc);

}








// ===============================
// Render SVG Preview
// ===============================


function renderPreview(){


    preview.innerHTML="";



    const doc =
    new DOMParser()
    .parseFromString(
        svgText,
        "image/svg+xml"
    );



    const svg =
    doc.querySelector("svg");



    if(!svg){

        preview.innerHTML=
        "Invalid SVG";

        return;

    }



    svg.setAttribute(
        "xmlns",
        "http://www.w3.org/2000/svg"
    );



    svg.style.maxWidth="100%";

    svg.style.maxHeight="650px";



    preview.appendChild(
        document.importNode(
            svg,
            true
        )
    );


}








// ===============================
// Load SVG
// ===============================


fileInput.addEventListener(
"change",
async function(e){



    const file =
    e.target.files[0];



    if(!file)
        return;



    svgText =
    fixSVG(
        await file.text()
    );



    renderPreview();


    renderColors();


});









// ===============================
// Normalize Colors
// ===============================


function normalizeColor(color){


    if(!color)
        return null;



    const canvas =
    document.createElement("canvas");


    const ctx =
    canvas.getContext("2d");



    ctx.fillStyle=color;



    return ctx.fillStyle.toLowerCase();


}









// ===============================
// Extract Colors
// ===============================


function extractColors(){



    const doc =
    new DOMParser()
    .parseFromString(
        svgText,
        "image/svg+xml"
    );



    const colors =
    new Map();





    function addColor(color){


        if(!color)
            return;



        color=color.trim();



        if(

            color==="none" ||

            color.includes("url(") ||

            color.includes("var(") ||

            color==="currentcolor"

        )
        return;



        const normalized =
        normalizeColor(color);



        if(normalized){


            colors.set(

                normalized,

                (colors.get(normalized)||0)+1

            );


        }


    }






    doc.querySelectorAll("*")
    .forEach(el=>{


        [

            "fill",

            "stroke",

            "color",

            "stop-color"

        ]
        .forEach(attr=>{


            addColor(
                el.getAttribute(attr)
            );


        });




        let style =
        el.getAttribute("style");



        if(style){


            let matches =
            style.matchAll(

            /(fill|stroke|color|stop-color)\s*:\s*([^;]+)/gi

            );



            for(let m of matches){


                addColor(m[2]);


            }


        }


    });






    doc.querySelectorAll("style")
    .forEach(tag=>{


        let css =
        tag.textContent;



        let matches =
        css.matchAll(

        /(fill|stroke|color|stop-color)\s*:\s*([^;}\n]+)/gi

        );



        for(let m of matches){


            addColor(m[2]);


        }


    });





    return [
        ...colors.keys()
    ];

}



 // ===============================
// Render Color List
// ===============================


function renderColors(){


    colorsBox.innerHTML="";



    const colors =
    extractColors();



    colors.forEach(color=>{


        const row =
        document.createElement("div");



        row.className =
        "color-item";




        const swatch =
        document.createElement("div");



        swatch.className =
        "swatch";


        swatch.style.background=color;





        const label =
        document.createElement("span");



        label.className =
        "color-label";



        label.textContent=color;





        row.appendChild(
            swatch
        );



        row.appendChild(
            label
        );





        row.onclick=function(){


            activeColor=color;



            picker.value=color;



            picker.click();


        };




        colorsBox.appendChild(row);



    });


}









// ===============================
// Replace Color
// ===============================


function replaceColor(
oldColor,
newColor
){



    const doc =
    new DOMParser()
    .parseFromString(
        svgText,
        "image/svg+xml"
    );





    function sameColor(a,b){


        return normalizeColor(a)
        ===
        normalizeColor(b);


    }





    doc.querySelectorAll("*")
    .forEach(el=>{



        [

        "fill",

        "stroke",

        "color",

        "stop-color"

        ]

        .forEach(attr=>{



            let value =
            el.getAttribute(attr);



            if(

                value &&
                sameColor(
                    value,
                    oldColor
                )

            ){


                el.setAttribute(
                    attr,
                    newColor
                );


            }



        });





        let style =
        el.getAttribute("style");



        if(style){


            style =
            style.replace(

                new RegExp(
                    oldColor,
                    "gi"
                ),

                newColor

            );



            el.setAttribute(
                "style",
                style
            );


        }



    });






    doc.querySelectorAll("style")
    .forEach(tag=>{


        tag.textContent =
        tag.textContent.replace(

            new RegExp(
                oldColor,
                "gi"
            ),

            newColor

        );


    });






    svgText =
    new XMLSerializer()
    .serializeToString(doc);



    renderPreview();


    renderColors();


}






// ===============================
// Color Picker
// ===============================


picker.addEventListener(
"input",
function(e){



    if(!activeColor)
        return;



    replaceColor(

        activeColor,

        e.target.value

    );



    activeColor =
    e.target.value;


});
// ===============================
// Export SVG
// ===============================


document
.getElementById("svg")
.onclick=function(){



    if(!svgText){


        alert("No SVG loaded");


        return;


    }




    const blob =
    new Blob(

        [svgText],

        {
            type:"image/svg+xml"
        }

    );




    const url =
    URL.createObjectURL(blob);




    const a =
    document.createElement("a");



    a.href=url;



    a.download =
    "edited-svg.svg";



    document.body.appendChild(a);



    a.click();



    document.body.removeChild(a);



    URL.revokeObjectURL(url);



};









// ===============================
// Export PNG High Quality
// ===============================


document
.getElementById("png")
.onclick=function(){



    if(!svgText){


        alert("No SVG loaded");


        return;


    }





    const parser =
    new DOMParser();



    const doc =
    parser.parseFromString(

        svgText,

        "image/svg+xml"

    );



    const svg =
    doc.querySelector("svg");



    if(!svg)
        return;





    // الحصول على الحجم الحقيقي


    let width =
    parseFloat(
        svg.getAttribute("width")
    );



    let height =
    parseFloat(
        svg.getAttribute("height")
    );




    let viewBox =
    svg.getAttribute("viewBox");





    if(viewBox){


        let values =
        viewBox
        .split(" ")
        .map(Number);



        width =
        values[2];


        height =
        values[3];


    }




    if(!width || !height){


        width=1000;

        height=1000;


    }







    svg.setAttribute(

        "width",

        width

    );



    svg.setAttribute(

        "height",

        height

    );



    svg.setAttribute(

        "xmlns",

        "http://www.w3.org/2000/svg"

    );






    const finalSVG =
    new XMLSerializer()
    .serializeToString(svg);






    const svgBlob =
    new Blob(

        [finalSVG],

        {
            type:
            "image/svg+xml"
        }

    );




    const url =
    URL.createObjectURL(svgBlob);




    const img =
    new Image();





    img.onload=function(){



        const scale=3;



        const canvas =
        document.createElement("canvas");



        canvas.width =
        width * scale;



        canvas.height =
        height * scale;




        const ctx =
        canvas.getContext("2d");



        ctx.scale(
            scale,
            scale
        );



        ctx.drawImage(

            img,

            0,

            0

        );






        canvas.toBlob(

        function(blob){



            const pngURL =
            URL.createObjectURL(blob);




            const a =
            document.createElement("a");



            a.href =
            pngURL;



            a.download =
            "edited-svg.png";



            document.body.appendChild(a);



            a.click();



            document.body.removeChild(a);



            URL.revokeObjectURL(
                pngURL
            );



        },

        "image/png"

        );




        URL.revokeObjectURL(url);



    };





    img.src=url;



};





</script>


</body>

</html>
